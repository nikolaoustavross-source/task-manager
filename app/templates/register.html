{% extends 'base.html' %}
{% block title %}Register – TaskManager{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Create account</h1>
  <p class="subtitle">Start organising your tasks today</p>

  <form method="POST" action="{{ url_for('auth.register') }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus placeholder="choose a username" />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label for="password">Password <span class="hint">(min. 8 characters)</span></label>
      <input type="password" id="password" name="password" required placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••" />
    </div>
    <button type="submit" class="btn-primary btn-full">Create Account</button>
  </form>

  <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
</div>
{% endblock %}
