{% extends 'base.html' %}
{% block title %}Login – TaskManager{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account</p>

  <form method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus placeholder="your username" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="••••••••" />
    </div>
    <button type="submit" class="btn-primary btn-full">Sign In</button>
  </form>

  <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
</div>
{% endblock %}
